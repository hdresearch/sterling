name: Sterling SDK Generation

on:
  # Triggered by chelsea repo when OpenAPI spec changes
  repository_dispatch:
    types: [openapi-updated]

  # Manual trigger
  workflow_dispatch:
    inputs:
      openapi_url:
        description: 'URL to OpenAPI JSON specification'
        required: false
        default: 'https://raw.githubusercontent.com/hdresearch/chelsea/main/openapi/openapi.json'

  # Daily check for spec changes
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate-sdks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sterling
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build Sterling
      run: zig build -Doptimize=ReleaseFast

    - name: Download Chelsea OpenAPI spec
      run: |
        SPEC_URL="${{ github.event.inputs.openapi_url || 'https://raw.githubusercontent.com/hdresearch/chelsea/main/openapi/openapi.json' }}"
        curl -fsSL -o openapi.json "$SPEC_URL"
        echo "Downloaded spec from $SPEC_URL"

    - name: Generate SDKs
      run: |
        ./zig-out/bin/sterling generate \
          --spec openapi.json \
          --config sterling-chelsea-config.toml

    - name: Upload generated SDKs
      uses: actions/upload-artifact@v4
      with:
        name: generated-sdks
        path: generated/

    - name: Push TypeScript SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/typescript
        git init
        git add -A
        git commit -m "Update TypeScript SDK from Chelsea OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/chelsea-typescript-sdk.git
        git push -f origin HEAD:main

    - name: Push Rust SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/rust
        git init
        git add -A
        git commit -m "Update Rust SDK from Chelsea OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/chelsea-rust-sdk.git
        git push -f origin HEAD:main

    - name: Push Python SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/python
        git init
        git add -A
        git commit -m "Update Python SDK from Chelsea OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/chelsea-python-sdk.git
        git push -f origin HEAD:main

    - name: Push Go SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/go
        git init
        git add -A
        git commit -m "Update Go SDK from Chelsea OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/chelsea-go-sdk.git
        git push -f origin HEAD:main

    - name: Sync vers-docs
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        git clone https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/vers-docs.git vers-docs-checkout
        cp openapi.json vers-docs-checkout/api-reference/openapi.json
        cd vers-docs-checkout
        if ! git diff --quiet api-reference/openapi.json; then
          git config user.name "Sterling Bot"
          git config user.email "sterling@hdresearch.com"
          BRANCH="chelsea-openapi-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add api-reference/openapi.json
          git commit -m "Update Chelsea API Reference (auto-generated)"
          git push origin "$BRANCH"
          echo "Pushed vers-docs update to branch $BRANCH"
        fi
