name: Sterling SDK Generation

on:
  # Triggered by chelsea repo when OpenAPI spec changes
  repository_dispatch:
    types: [openapi-updated]

  # Manual trigger
  workflow_dispatch:

  # Daily check for spec changes
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate-sdks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sterling
      uses: actions/checkout@v4

    - name: Checkout Chelsea (for OpenAPI spec)
      uses: actions/checkout@v4
      with:
        repository: hdresearch/chelsea
        ref: next
        path: chelsea
        token: ${{ secrets.SDK_PUSH_TOKEN }}
        sparse-checkout: openapi/

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build Sterling
      run: zig build -Doptimize=ReleaseFast

    - name: Generate SDKs
      run: |
        ./zig-out/bin/sterling generate \
          --spec chelsea/openapi/orchestrator.openapi.json \
          --config sterling.toml

    - name: Upload generated SDKs
      uses: actions/upload-artifact@v4
      with:
        name: generated-sdks
        path: generated/

    - name: Push TypeScript SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/typescript
        git init
        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git add -A
        git commit -m "Update TypeScript SDK from Orchestrator OpenAPI spec

        Auto-generated by Sterling from hdresearch/chelsea" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/ts-sdk.git
        git push -f origin HEAD:main

    - name: Push Rust SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/rust
        git init
        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git add -A
        git commit -m "Update Rust SDK from Orchestrator OpenAPI spec

        Auto-generated by Sterling from hdresearch/chelsea" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/rust-sdk.git
        git push -f origin HEAD:main

    - name: Push Python SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/python
        git init
        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git add -A
        git commit -m "Update Python SDK from Orchestrator OpenAPI spec

        Auto-generated by Sterling from hdresearch/chelsea" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/python-sdk.git
        git push -f origin HEAD:main

    - name: Push Go SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/go
        git init
        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git add -A
        git commit -m "Update Go SDK from Orchestrator OpenAPI spec

        Auto-generated by Sterling from hdresearch/chelsea" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/go-sdk.git
        git push -f origin HEAD:main

    - name: Publish TypeScript SDK to npm
      if: success()
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        if [ -z "$NODE_AUTH_TOKEN" ]; then
          echo "NPM_TOKEN not set, skipping npm publish"
          exit 0
        fi
        cd generated/typescript
        npm install typescript --save-dev
        npx tsc
        echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
        npm publish --access public || echo "Publish failed (version may already exist)"

    - name: Publish Python SDK to PyPI
      if: success()
      env:
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        if [ -z "$TWINE_PASSWORD" ]; then
          echo "PYPI_TOKEN not set, skipping PyPI publish"
          exit 0
        fi
        cd generated/python
        pip install build twine
        python -m build
        twine upload dist/* --username __token__ --non-interactive || echo "Publish failed (version may already exist)"

    - name: Publish Rust SDK to crates.io
      if: success()
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      run: |
        if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
          echo "CRATES_IO_TOKEN not set, skipping crates.io publish"
          exit 0
        fi
        cd generated/rust
        cargo publish --allow-dirty || echo "Publish failed (version may already exist)"

    - name: Create PR in vers-docs
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        BRANCH_NAME="sterling/update-api-docs-$(date +%Y%m%d-%H%M%S)"

        git clone https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/vers-docs.git vers-docs
        cd vers-docs

        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git checkout -b "$BRANCH_NAME"

        # Copy generated docs (adjust source path if Sterling outputs docs elsewhere)
        mkdir -p docs/api/chelsea
        if [ -d "../generated/docs" ]; then
          cp -r ../generated/docs/* docs/api/chelsea/
        fi

        # Copy the OpenAPI specs for reference
        cp ../chelsea/openapi/orchestrator.openapi.json docs/api/chelsea/openapi.json 2>/dev/null || true
        cp ../chelsea/openapi/orchestrator.openapi.yaml docs/api/chelsea/openapi.yaml 2>/dev/null || true

        git add docs/api/chelsea/
        if git diff --staged --quiet; then
          echo "No documentation changes to commit"
        else
          git commit -m "Update Chelsea API documentation

        Auto-generated by Sterling from hdresearch/chelsea OpenAPI spec"
          git push origin "$BRANCH_NAME"

          # Create PR using GitHub API
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hdresearch/vers-docs/pulls \
            -d "{
              \"title\": \"Update Chelsea API documentation\",
              \"body\": \"Auto-generated by Sterling from the latest OpenAPI spec in hdresearch/chelsea.\",
              \"head\": \"$BRANCH_NAME\",
              \"base\": \"main\"
            }"
        fi
