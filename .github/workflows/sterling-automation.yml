name: Sterling SDK Generation

on:
  # Triggered by chelsea repo when OpenAPI spec changes
  repository_dispatch:
    types: [openapi-updated]

  # Manual trigger
  workflow_dispatch:

  # Daily check for spec changes
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  id-token: write  # needed for npm provenance + PyPI trusted publishing

jobs:
  generate-sdks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sterling
      uses: actions/checkout@v4

    - name: Checkout Chelsea (for OpenAPI spec)
      uses: actions/checkout@v4
      with:
        repository: hdresearch/chelsea
        ref: next
        path: chelsea
        token: ${{ secrets.SDK_PUSH_TOKEN }}
        sparse-checkout: openapi/

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build Sterling
      run: zig build -Doptimize=ReleaseFast

    - name: Generate SDKs
      run: |
        ./zig-out/bin/sterling generate \
          --spec chelsea/openapi/orchestrator.openapi.json \
          --config sterling.toml

    - name: Upload generated SDKs
      uses: actions/upload-artifact@v4
      with:
        name: generated-sdks
        path: generated/

    # ─── Push to SDK repos ──────────────────────────────────────────────

    - name: Push TypeScript SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/typescript
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update TypeScript SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/ts-sdk.git
        git push -f origin HEAD:main

    - name: Push Rust SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/rust
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Rust SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/rust-sdk.git
        git push -f origin HEAD:main

    - name: Push Python SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/python
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Python SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/python-sdk.git
        git push -f origin HEAD:main

    - name: Push Go SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/go
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Go SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/go-sdk.git
        git push -f origin HEAD:main

    - name: Push Java SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/java
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Java SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/java-sdk.git
        git push -f origin HEAD:main

    - name: Push Kotlin SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/kotlin
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Kotlin SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/kotlin-sdk.git
        git push -f origin HEAD:main

    - name: Push Ruby SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/ruby
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Ruby SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/ruby-sdk.git
        git push -f origin HEAD:main

    - name: Push PHP SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/php
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update PHP SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/php-sdk.git
        git push -f origin HEAD:main

    - name: Push C# SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/csharp
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update C# SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/csharp-sdk.git
        git push -f origin HEAD:main

    # ─── Publish to package registries ──────────────────────────────────

    # --- npm (TypeScript) ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Publish to npm
      if: success()
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        cd generated/typescript
        npm install
        npx tsc
        npm publish --access public || echo "⚠️ npm publish skipped (version may already exist)"

    # --- PyPI (Python) — Trusted publishing via OIDC ---
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build Python package
      if: success()
      run: |
        cd generated/python
        pip install build
        python -m build

    - name: Publish to PyPI
      if: success()
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: generated/python/dist/
        skip-existing: true
      # Uses OIDC trusted publishing — no token needed.
      # Configure at: https://pypi.org/manage/account/publishing/
      # Owner: hdresearch, Repo: sterling, Workflow: sterling-automation.yml

    # --- crates.io (Rust) ---
    - name: Publish to crates.io
      if: success()
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      run: |
        if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
          echo "⚠️ CRATES_IO_TOKEN not set, skipping crates.io publish"
          exit 0
        fi
        cd generated/rust
        cargo publish --allow-dirty || echo "⚠️ crates.io publish skipped (version may already exist)"

    # --- Go proxy (automatic via git tag) ---
    - name: Tag Go module
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/go
        VERSION=$(grep '"version"' ../typescript/package.json | head -1 | sed 's/.*: "//;s/".*//')
        TAG="v${VERSION}"
        # Push tag to go-sdk repo
        git tag "$TAG" || true
        git push origin "$TAG" 2>/dev/null || echo "⚠️ Go tag ${TAG} already exists"
        echo "Go module available at: go get github.com/hdresearch/go-sdk@${TAG}"

    # --- RubyGems (Ruby) ---
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'

    - name: Publish to RubyGems
      if: success()
      env:
        GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      run: |
        if [ -z "$GEM_HOST_API_KEY" ]; then
          echo "⚠️ RUBYGEMS_API_KEY not set, skipping RubyGems publish"
          exit 0
        fi
        cd generated/ruby
        gem build vers-sdk.gemspec
        gem push vers-sdk-*.gem || echo "⚠️ RubyGems publish skipped (version may already exist)"

    # --- NuGet (C#) ---
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Publish to NuGet
      if: success()
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if [ -z "$NUGET_API_KEY" ]; then
          echo "⚠️ NUGET_API_KEY not set, skipping NuGet publish"
          exit 0
        fi
        cd generated/csharp
        dotnet pack -c Release
        dotnet nuget push bin/Release/*.nupkg \
          --api-key "$NUGET_API_KEY" \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate || echo "⚠️ NuGet publish skipped (version may already exist)"

    # --- Packagist (PHP) — automatic via GitHub webhook ---
    # No publish step needed. Register hdresearch/php-sdk at packagist.org
    # and enable auto-update webhook. `composer require vers/sdk` works after that.

    # --- Maven Central (Java + Kotlin) ---
    # Requires Sonatype OSSRH account + GPG signing.
    # Deferred until domain verification is complete.
    # Secrets needed: MAVEN_USERNAME, MAVEN_PASSWORD, MAVEN_GPG_KEY, MAVEN_GPG_PASSPHRASE
    #
    # When ready, add:
    # - name: Publish Java to Maven Central
    #   run: cd generated/java && mvn deploy -P release
    # - name: Publish Kotlin to Maven Central
    #   run: cd generated/kotlin && ./gradlew publish

    # ─── Documentation PR ───────────────────────────────────────────────

    - name: Update vers-docs
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        set -e
        BRANCH_NAME="sterling/update-api-docs"
        VERSION=$(grep '"version"' generated/typescript/package.json | head -1 | sed 's/.*: "//;s/".*//')

        git clone https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/vers-docs.git vers-docs
        cd vers-docs
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"

        # Reuse existing branch or create new one
        git checkout "$BRANCH_NAME" 2>/dev/null || git checkout -b "$BRANCH_NAME"

        # 1. Update OpenAPI spec (correct path — where Mintlify reads it)
        cp ../chelsea/openapi/orchestrator.openapi.json api-reference/openapi.json

        # 2. Generate SDK docs page
        cat > sdks.mdx << 'SDKEOF'
        ---
        title: "SDKs"
        description: "Official Vers SDKs for 9 languages — auto-generated from the OpenAPI spec by Sterling"
        ---

        # SDKs

        Vers publishes official SDKs for **9 languages**, all auto-generated from the OpenAPI spec and published to package registries on every API change.

        ## Installation

        <Tabs>
          <Tab title="TypeScript">
            ```bash
            npm install vers-sdk
            ```
            ```typescript
            import { VersSdkClient } from "vers-sdk";

            const client = new VersSdkClient({ apiKey: process.env.VERS_API_KEY });
            const vms = await client.listVms();
            ```
            [GitHub](https://github.com/hdresearch/ts-sdk) · [npm](https://www.npmjs.com/package/vers-sdk)
          </Tab>
          <Tab title="Python">
            ```bash
            pip install vers-sdk
            ```
            ```python
            from vers_sdk import VersSdkClient

            client = VersSdkClient(api_key=os.environ["VERS_API_KEY"])
            vms = client.list_vms()
            ```
            [GitHub](https://github.com/hdresearch/python-sdk) · [PyPI](https://pypi.org/project/vers-sdk/)
          </Tab>
          <Tab title="Go">
            ```bash
            go get github.com/hdresearch/go-sdk
            ```
            ```go
            import vers "github.com/hdresearch/go-sdk"

            client := vers.NewVersSdkClient(os.Getenv("VERS_API_KEY"))
            vms, err := client.ListVms(nil)
            ```
            [GitHub](https://github.com/hdresearch/go-sdk)
          </Tab>
          <Tab title="Rust">
            ```bash
            cargo add vers-sdk
            ```
            ```rust
            use vers_sdk::VersSdkClient;

            let client = VersSdkClient::new(std::env::var("VERS_API_KEY")?);
            let vms = client.list_vms(None).await?;
            ```
            [GitHub](https://github.com/hdresearch/rust-sdk) · [crates.io](https://crates.io/crates/vers-sdk)
          </Tab>
          <Tab title="Ruby">
            ```bash
            gem install vers-sdk
            ```
            ```ruby
            require "vers_sdk"

            client = VersSdk::Client.new(api_key: ENV["VERS_API_KEY"])
            vms = client.list_vms
            ```
            [GitHub](https://github.com/hdresearch/ruby-sdk) · [RubyGems](https://rubygems.org/gems/vers-sdk)
          </Tab>
          <Tab title="C#">
            ```bash
            dotnet add package vers-sdk
            ```
            ```csharp
            using VersSdk;

            var client = new VersClient(Environment.GetEnvironmentVariable("VERS_API_KEY"));
            var vms = await client.ListVmsAsync();
            ```
            [GitHub](https://github.com/hdresearch/csharp-sdk) · [NuGet](https://www.nuget.org/packages/vers-sdk)
          </Tab>
          <Tab title="Java">
            ```xml
            <!-- Maven — coming soon to Maven Central -->
            <dependency>
              <groupId>com.vers</groupId>
              <artifactId>vers-sdk</artifactId>
              <version>0.1.6</version>
            </dependency>
            ```
            ```java
            import com.vers.sdk.VersClient;

            VersClient client = new VersClient(System.getenv("VERS_API_KEY"));
            List<VM> vms = client.listVms(null);
            ```
            [GitHub](https://github.com/hdresearch/java-sdk)
          </Tab>
          <Tab title="Kotlin">
            ```kotlin
            // Gradle
            implementation("com.vers:vers-sdk:0.1.6")
            ```
            ```kotlin
            import com.vers.sdk.VersClient

            val client = VersClient(System.getenv("VERS_API_KEY"))
            val vms = client.listVms()
            ```
            [GitHub](https://github.com/hdresearch/kotlin-sdk)
          </Tab>
          <Tab title="PHP">
            ```bash
            composer require vers/sdk
            ```
            ```php
            use VersSdk\VersClient;

            $client = new VersClient(getenv('VERS_API_KEY'));
            $vms = $client->listVms();
            ```
            [GitHub](https://github.com/hdresearch/php-sdk)
          </Tab>
        </Tabs>

        ## Features

        All SDKs include:

        - **Full API coverage** — 47 operations across VMs, commits, repositories, domains, environment variables, and tags
        - **Typed models** — Request/response types generated from the OpenAPI schema
        - **Error handling** — Typed error responses with status codes
        - **Automatic retries** — Configurable retry with exponential backoff and `Retry-After` support
        - **Request options** — Per-request timeout, headers, and idempotency key overrides
        - **Query parameters** — Typed parameter interfaces for filtering and pagination
        - **Platform detection** — `User-Agent` header with SDK version, language runtime, and OS info

        ## Authentication

        All SDKs accept an API key via constructor or environment variable:

        ```bash
        export VERS_API_KEY="your-api-key"
        ```

        Get your API key from [vers.sh/billing](https://vers.sh/billing).

        ## Source

        SDKs are auto-generated by [Sterling](https://github.com/hdresearch/sterling) from the [Chelsea OpenAPI spec](https://github.com/hdresearch/chelsea) and published on every API change.
        SDKEOF

        # Remove leading whitespace from heredoc (was indented in YAML)
        sed -i 's/^        //' sdks.mdx

        # 3. Add SDKs tab to docs.json if not already present
        python3 << 'PYEOF'
        import json

        with open("docs.json", "r") as f:
            docs = json.load(f)

        tabs = docs["navigation"]["tabs"]
        has_sdk_tab = any(t.get("tab") == "SDKs" for t in tabs)

        if not has_sdk_tab:
            # Insert SDKs tab before the API tab
            api_idx = next((i for i, t in enumerate(tabs) if t.get("tab") == "API"), len(tabs))
            sdk_tab = {
                "tab": "SDKs",
                "groups": [
                    {
                        "group": "SDKs",
                        "pages": ["sdks"]
                    }
                ]
            }
            tabs.insert(api_idx, sdk_tab)

            with open("docs.json", "w") as f:
                json.dump(docs, f, indent=2)
                f.write("\n")
            print("Added SDKs tab to docs.json")
        else:
            print("SDKs tab already exists in docs.json")
        PYEOF

        # 4. Fix old SDK import references (vers → vers-sdk)
        for f in vm-access.mdx api-reference/introduction.mdx; do
          if [ -f "$f" ]; then
            sed -i "s/from 'vers';/from 'vers-sdk';/g" "$f"
            sed -i "s/import Vers, { withSSH }/import { VersSdkClient }/g" "$f"
          fi
        done

        # 5. Stage all changes
        git add api-reference/openapi.json sdks.mdx docs.json vm-access.mdx api-reference/introduction.mdx 2>/dev/null || true

        if git diff --staged --quiet; then
          echo "No documentation changes — spec and SDK docs are up to date"
          exit 0
        fi

        git commit -m "Update API docs and SDK reference (v${VERSION})"

        # Force-push to the fixed branch name (updates existing PR if open)
        git push -f origin "$BRANCH_NAME"

        # Check if a PR already exists for this branch
        EXISTING_PR=$(curl -s \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/hdresearch/vers-docs/pulls?head=hdresearch:${BRANCH_NAME}&state=open" \
          | python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else '')" 2>/dev/null || echo "")

        if [ -n "$EXISTING_PR" ]; then
          echo "✅ Updated existing PR #${EXISTING_PR}"
          # Update PR body with version
          curl -s -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/hdresearch/vers-docs/pulls/${EXISTING_PR}" \
            -d "{
              \"body\": \"Auto-generated by Sterling from the latest OpenAPI spec (v${VERSION}).\\n\\nUpdates:\\n- OpenAPI spec → \`api-reference/openapi.json\`\\n- SDK reference page → \`sdks.mdx\` (9 languages)\"
            }" > /dev/null
        else
          # Create new PR
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hdresearch/vers-docs/pulls \
            -d "{
              \"title\": \"[Sterling] Update API docs & SDK reference (v${VERSION})\",
              \"body\": \"Auto-generated by Sterling from the latest OpenAPI spec (v${VERSION}).\\n\\nUpdates:\\n- OpenAPI spec → \`api-reference/openapi.json\`\\n- SDK reference page → \`sdks.mdx\` (9 languages)\",
              \"head\": \"$BRANCH_NAME\",
              \"base\": \"main\"
            }"
          echo "✅ Created new PR"
        fi
