name: Sterling SDK Generation

on:
  # Triggered by chelsea repo when OpenAPI spec changes
  repository_dispatch:
    types: [openapi-updated]

  # Manual trigger
  workflow_dispatch:

  # Daily check for spec changes
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  id-token: write  # needed for npm provenance + PyPI trusted publishing

jobs:
  generate-sdks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sterling
      uses: actions/checkout@v4

    - name: Checkout Chelsea (for OpenAPI spec)
      uses: actions/checkout@v4
      with:
        repository: hdresearch/chelsea
        ref: next
        path: chelsea
        token: ${{ secrets.SDK_PUSH_TOKEN }}
        sparse-checkout: openapi/

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build Sterling
      run: zig build -Doptimize=ReleaseFast

    - name: Generate SDKs
      run: |
        ./zig-out/bin/sterling generate \
          --spec chelsea/openapi/orchestrator.openapi.json \
          --config sterling.toml

    - name: Upload generated SDKs
      uses: actions/upload-artifact@v4
      with:
        name: generated-sdks
        path: generated/

    # ─── Push to SDK repos ──────────────────────────────────────────────

    - name: Push TypeScript SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/typescript
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update TypeScript SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/ts-sdk.git
        git push -f origin HEAD:main

    - name: Push Rust SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/rust
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Rust SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/rust-sdk.git
        git push -f origin HEAD:main

    - name: Push Python SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/python
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Python SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/python-sdk.git
        git push -f origin HEAD:main

    - name: Push Go SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/go
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Go SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/go-sdk.git
        git push -f origin HEAD:main

    - name: Push Java SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/java
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Java SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/java-sdk.git
        git push -f origin HEAD:main

    - name: Push Kotlin SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/kotlin
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Kotlin SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/kotlin-sdk.git
        git push -f origin HEAD:main

    - name: Push Ruby SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/ruby
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Ruby SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/ruby-sdk.git
        git push -f origin HEAD:main

    - name: Push PHP SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/php
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update PHP SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/php-sdk.git
        git push -f origin HEAD:main

    - name: Push C# SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/csharp
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update C# SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/csharp-sdk.git
        git push -f origin HEAD:main

    - name: Push Dart SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/dart
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Dart SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/dart-sdk.git
        git push -f origin HEAD:main

    - name: Push Scala SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/scala
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Scala SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/scala-sdk.git
        git push -f origin HEAD:main

    - name: Push Swift SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/swift
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Swift SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/swift-sdk.git
        git push -f origin HEAD:main

    - name: Push Zig SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/zig
        git init
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"
        git add -A
        git commit -m "Update Zig SDK from OpenAPI spec" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/zig-sdk.git
        git push -f origin HEAD:main

    # ─── Publish to package registries ──────────────────────────────────

    # --- npm (TypeScript) ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Publish to npm
      if: always()
      continue-on-error: true
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        cd generated/typescript
        npm install
        npx tsc
        npm publish --access public || echo "⚠️ npm publish skipped (version may already exist)"

    # --- PyPI (Python) — Trusted publishing via OIDC ---
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build Python package
      if: always()
      run: |
        cd generated/python
        pip install build
        python -m build

    - name: Publish to PyPI
      if: always()
      continue-on-error: true
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: generated/python/dist/
        skip-existing: true
      # Uses OIDC trusted publishing — no token needed.
      # Configure at: https://pypi.org/manage/account/publishing/
      # Owner: hdresearch, Repo: sterling, Workflow: sterling-automation.yml

    # --- crates.io (Rust) ---
    - name: Publish to crates.io
      if: always()
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      run: |
        if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
          echo "⚠️ CRATES_IO_TOKEN not set, skipping crates.io publish"
          exit 0
        fi
        cd generated/rust
        cargo publish --allow-dirty || echo "⚠️ crates.io publish skipped (version may already exist)"

    # --- Go proxy (automatic via git tag) ---
    - name: Tag Go module
      if: always()
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/go
        VERSION=$(grep '"version"' ../typescript/package.json | head -1 | sed 's/.*: "//;s/".*//')
        TAG="v${VERSION}"
        # Push tag to go-sdk repo
        git tag "$TAG" || true
        git push origin "$TAG" 2>/dev/null || echo "⚠️ Go tag ${TAG} already exists"
        echo "Go module available at: go get github.com/hdresearch/go-sdk@${TAG}"

    # --- RubyGems (Ruby) ---
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'

    - name: Publish to RubyGems
      if: always()
      continue-on-error: true
      env:
        GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      run: |
        if [ -z "$GEM_HOST_API_KEY" ]; then
          echo "⚠️ RUBYGEMS_API_KEY not set, skipping RubyGems publish"
          exit 0
        fi
        cd generated/ruby
        gem build vers-sdk.gemspec
        gem push vers-sdk-*.gem || echo "⚠️ RubyGems publish skipped (version may already exist)"

    # --- NuGet (C#) ---
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Publish to NuGet
      if: always()
      continue-on-error: true
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if [ -z "$NUGET_API_KEY" ]; then
          echo "⚠️ NUGET_API_KEY not set, skipping NuGet publish"
          exit 0
        fi
        cd generated/csharp
        dotnet pack -c Release
        dotnet nuget push bin/Release/*.nupkg \
          --api-key "$NUGET_API_KEY" \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate || echo "⚠️ NuGet publish skipped (version may already exist)"

    # --- Packagist (PHP) — automatic via GitHub webhook ---
    # No publish step needed. hdresearch/php-sdk is registered at packagist.org
    # and auto-updates on push. `composer require vers/vers-sdk` works.

    # --- Maven Central (Java) ---
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_GPG_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Publish Java to Maven Central
      if: always()
      continue-on-error: true
      env:
        MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      run: |
        if [ -z "$MAVEN_USERNAME" ]; then
          echo "⚠️ MAVEN_USERNAME not set, skipping Maven Central publish"
          exit 0
        fi
        cd generated/java
        mvn deploy -B --no-transfer-progress -DskipTests \
          || echo "⚠️ Maven Central publish skipped (version may already exist)"

    # --- Maven Central (Kotlin) ---
    - name: Setup Gradle
      if: always()
      uses: gradle/actions/setup-gradle@v4

    - name: Publish Kotlin to Maven Central
      if: always()
      continue-on-error: true
      env:
        MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_KEY }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      run: |
        if [ -z "$MAVEN_USERNAME" ]; then
          echo "⚠️ MAVEN_USERNAME not set, skipping Kotlin publish"
          exit 0
        fi
        cd generated/kotlin
        gradle publish --no-daemon \
          || echo "⚠️ Kotlin Maven Central publish skipped (version may already exist)"

    # --- Maven Central (Scala) ---
    - name: Setup sbt
      if: always()
      uses: sbt/setup-sbt@v1

    - name: Publish Scala to Maven Central
      if: always()
      continue-on-error: true
      env:
        MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        PGP_SECRET: ${{ secrets.MAVEN_GPG_KEY }}
        PGP_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      run: |
        if [ -z "$MAVEN_USERNAME" ]; then
          echo "⚠️ MAVEN_USERNAME not set, skipping Scala publish"
          exit 0
        fi
        cd generated/scala
        sbt publish \
          || echo "⚠️ Scala Maven Central publish skipped (version may already exist)"

    # --- pub.dev (Dart) ---
    - name: Setup Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: stable

    - name: Publish Dart to pub.dev
      if: always()
      continue-on-error: true
      env:
        PUB_TOKEN: ${{ secrets.PUB_DEV_TOKEN }}
      run: |
        if [ -z "$PUB_TOKEN" ]; then
          echo "⚠️ PUB_DEV_TOKEN not set, skipping pub.dev publish"
          exit 0
        fi
        cd generated/dart
        dart pub publish --force \
          || echo "⚠️ pub.dev publish skipped (version may already exist)"

    # --- SwiftPM (Swift) — tag-based, like Go ---
    - name: Tag Swift package
      if: always()
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/swift
        VERSION=$(grep '"version"' ../typescript/package.json | head -1 | sed 's/.*: "//;s/".*//')
        TAG="${VERSION}"
        git tag "$TAG" || true
        git push origin "$TAG" 2>/dev/null || echo "⚠️ Swift tag ${TAG} already exists"
        echo "Swift package: .package(url: \"https://github.com/hdresearch/swift-sdk.git\", from: \"${TAG}\")"

    # --- Zig — tag-based ---
    - name: Tag Zig package
      if: always()
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/zig
        VERSION=$(grep '"version"' ../typescript/package.json | head -1 | sed 's/.*: "//;s/".*//')
        TAG="v${VERSION}"
        git tag "$TAG" || true
        git push origin "$TAG" 2>/dev/null || echo "⚠️ Zig tag ${TAG} already exists"

    # ─── Documentation PR ───────────────────────────────────────────────

    - name: Update vers-docs
      if: always()
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        set -e
        BRANCH_NAME="sterling/update-api-docs"
        VERSION=$(grep '"version"' generated/typescript/package.json | head -1 | sed 's/.*: "//;s/".*//')

        git clone https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/vers-docs.git vers-docs
        cd vers-docs
        git config user.name "Sterling"
        git config user.email "yev@hdr.is"

        # Reuse existing branch or create new one
        git checkout "$BRANCH_NAME" 2>/dev/null || git checkout -b "$BRANCH_NAME"

        # Run the docs updater script
        # --llm flag enables Claude-powered updates to tutorials/examples when the API changes
        LLM_FLAG=""
        if [ -n "$ANTHROPIC_API_KEY" ]; then
          LLM_FLAG="--llm"
        fi
        cd ..
        python3 scripts/update-docs.py vers-docs chelsea/openapi/orchestrator.openapi.json "$VERSION" $LLM_FLAG

        # Stage and commit
        cd vers-docs
        git add -A

        if git diff --staged --quiet; then
          echo "No documentation changes — everything is up to date"
          exit 0
        fi

        git commit -m "Update API docs and SDK reference (v${VERSION})"

        # Force-push to the fixed branch name (updates existing PR if open)
        git push -f origin "$BRANCH_NAME"

        # Check if a PR already exists for this branch
        EXISTING_PR=$(curl -s \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/hdresearch/vers-docs/pulls?head=hdresearch:${BRANCH_NAME}&state=open" \
          | python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else '')" 2>/dev/null || echo "")

        PR_BODY="Auto-generated by Sterling from OpenAPI spec v${VERSION}. Updates openapi.json, introduction.mdx, sdks.mdx, docs.json, and code samples in tutorials/examples."

        if [ -n "$EXISTING_PR" ]; then
          echo "✅ Updated existing PR #${EXISTING_PR}"
          curl -s -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/hdresearch/vers-docs/pulls/${EXISTING_PR}" \
            -d "{\"body\": \"${PR_BODY}\"}" > /dev/null
        else
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hdresearch/vers-docs/pulls \
            -d "{\"title\": \"[Sterling] Update API docs (v${VERSION})\", \"body\": \"${PR_BODY}\", \"head\": \"${BRANCH_NAME}\", \"base\": \"main\"}"
          echo "✅ Created new PR"
        fi
