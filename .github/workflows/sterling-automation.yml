name: Sterling SDK Generation

on:
  # Triggered by chelsea repo when OpenAPI spec changes
  repository_dispatch:
    types: [openapi-updated]

  # Manual trigger
  workflow_dispatch:

  # Daily check for spec changes
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate-sdks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sterling
      uses: actions/checkout@v4

    - name: Checkout Chelsea (for OpenAPI spec)
      uses: actions/checkout@v4
      with:
        repository: hdresearch/chelsea
        ref: next
        path: chelsea
        token: ${{ secrets.SDK_PUSH_TOKEN }}
        sparse-checkout: openapi/

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build Sterling
      run: zig build -Doptimize=ReleaseFast

    - name: Generate SDKs
      run: |
        ./zig-out/bin/sterling generate \
          --spec chelsea/openapi/orchestrator.openapi.json \
          --config sterling.toml

    - name: Upload generated SDKs
      uses: actions/upload-artifact@v4
      with:
        name: generated-sdks
        path: generated/

    - name: Push TypeScript SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/typescript
        git init
        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git add -A
        git commit -m "Update TypeScript SDK from Orchestrator OpenAPI spec

        Auto-generated by Sterling from hdresearch/chelsea" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/vers-sdk-ts.git
        git push -f origin HEAD:main

    - name: Push Rust SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/rust
        git init
        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git add -A
        git commit -m "Update Rust SDK from Orchestrator OpenAPI spec

        Auto-generated by Sterling from hdresearch/chelsea" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/vers-sdk-rust.git
        git push -f origin HEAD:main

    - name: Push Python SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/python
        git init
        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git add -A
        git commit -m "Update Python SDK from Orchestrator OpenAPI spec

        Auto-generated by Sterling from hdresearch/chelsea" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/vers-sdk-python.git
        git push -f origin HEAD:main

    - name: Push Go SDK
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.SDK_PUSH_TOKEN }}
      run: |
        cd generated/go
        git init
        git config user.name "Sterling Bot"
        git config user.email "sterling@hdresearch.com"
        git add -A
        git commit -m "Update Go SDK from Orchestrator OpenAPI spec

        Auto-generated by Sterling from hdresearch/chelsea" || exit 0
        git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/hdresearch/vers-sdk-go.git
        git push -f origin HEAD:main
