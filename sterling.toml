# Sterling SDK Generator Configuration for hdresearch/chelsea
# Generates typed SDKs from the Orchestrator Control Plane API

[project]
name = "vers-sdk"
version = "0.1.8"
description = "Vers API - VM orchestration platform"

[targets.typescript]
language = "typescript"
repository = "hdresearch/ts-sdk"
output_dir = "./generated/typescript"

[targets.rust]
language = "rust"
repository = "hdresearch/rust-sdk"
output_dir = "./generated/rust"

[targets.python]
language = "python"
repository = "hdresearch/python-sdk"
output_dir = "./generated/python"

[targets.go]
language = "go"
repository = "hdresearch/go-sdk"
output_dir = "./generated/go"

[targets.java]
language = "java"
repository = "hdresearch/java-sdk"
output_dir = "./generated/java"

[targets.kotlin]
language = "kotlin"
repository = "hdresearch/kotlin-sdk"
output_dir = "./generated/kotlin"

[targets.ruby]
language = "ruby"
repository = "hdresearch/ruby-sdk"
output_dir = "./generated/ruby"

[targets.php]
language = "php"
repository = "hdresearch/php-sdk"
output_dir = "./generated/php"

[targets.csharp]
language = "csharp"
repository = "hdresearch/csharp-sdk"
output_dir = "./generated/csharp"

[targets.dart]
language = "dart"
repository = "hdresearch/dart-sdk"
output_dir = "./generated/dart"

[targets.scala]
language = "scala"
repository = "hdresearch/scala-sdk"
output_dir = "./generated/scala"

[targets.swift]
language = "swift"
repository = "hdresearch/swift-sdk"
output_dir = "./generated/swift"

[llm]
provider = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"
model = "claude-sonnet-4-20250514"
