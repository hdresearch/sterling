# Sterling SDK Generator Configuration for hdresearch/chelsea
# This configuration automates SDK generation from Chelsea OpenAPI specs
# and documentation generation for hdresearch/vers-docs

[project]
name = "chelsea-api"
version = "1.0.0"
description = "Chelsea API SDK - Automated SDK generation from OpenAPI specifications"

# Source configuration - where to watch for OpenAPI changes
[source]
repository = "https://github.com/hdresearch/chelsea"
openapi_path = "openapi.yaml"  # or wherever the OpenAPI spec is located
branch = "main"
webhook_secret = "${WEBHOOK_SECRET}"  # GitHub webhook secret

# SDK Generation Targets
[targets.typescript]
language = "typescript"
repository = "https://github.com/hdresearch/chelsea-typescript-sdk"
output_dir = "./generated/typescript"
branch = "main"
package_name = "@hdresearch/chelsea"
npm_publish = true

[targets.rust]
language = "rust"
repository = "https://github.com/hdresearch/chelsea-rust-sdk"
output_dir = "./generated/rust"
branch = "main"
crate_name = "chelsea-api"
crates_io_publish = true

[targets.python]
language = "python"
repository = "https://github.com/hdresearch/chelsea-python-sdk"
output_dir = "./generated/python"
branch = "main"
package_name = "chelsea-api"
pypi_publish = true

[targets.go]
language = "go"
repository = "https://github.com/hdresearch/chelsea-go-sdk"
output_dir = "./generated/go"
branch = "main"
module_name = "github.com/hdresearch/chelsea-go-sdk"

# LLM Enhancement Configuration
[llm]
provider = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"
model = "claude-3-5-sonnet-20241022"
enable_enhancement = true
enable_documentation = true
enable_error_fixing = true

# GitHub Automation
[github]
token = "${GITHUB_TOKEN}"
org = "hdresearch"
auto_create_repos = true
auto_setup_ci = true
auto_create_releases = true

# Documentation Generation for vers-docs
[output.docs]
format = "mintlify"
output_dir = "./generated/docs"
repository = "https://github.com/hdresearch/vers-docs"
docs_path = "docs/chelsea"  # Path within vers-docs repo
auto_sync = true
create_pr = true

# Webhook Configuration for Automation
[webhook]
enabled = true
port = 8080
path = "/webhook/chelsea"
secret = "${WEBHOOK_SECRET}"
target_repo = "hdresearch/chelsea"
openapi_patterns = [
    "openapi.yaml",
    "openapi.json", 
    "api-spec.yaml",
    "swagger.yaml"
]

# Automation Pipeline Configuration
[pipeline]
trigger_on_push = true
trigger_on_pr = false
auto_commit = true
auto_push = true
auto_tag = true
notification_webhook = "${SLACK_WEBHOOK_URL}"  # Optional Slack notifications

# Package Publishing Configuration
[publishing]
npm_token = "${NPM_TOKEN}"
pypi_token = "${PYPI_TOKEN}"
auto_publish_on_tag = true
semantic_versioning = true
