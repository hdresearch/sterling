name: Sterling SDK Generation
on:
  push:
    paths:
      - 'openapi/**'
  workflow_dispatch:

jobs:
  generate-sdks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.12.0
          
      - name: Build Sterling
        run: zig build -Doptimize=ReleaseFast
        
      - name: Generate SDKs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./zig-out/bin/sterling generate \
            --spec openapi/openapi.yaml \
            --config sterling-chelsea-config.toml \
            --enhance --docs --github
            
      - name: Push SDK Updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Push to each SDK repository
          for repo in chelsea-typescript-sdk chelsea-rust-sdk chelsea-python-sdk chelsea-go-sdk; do
            if [ -d "generated/$repo" ]; then
              cd "generated/$repo"
              git remote add origin "https://github.com/hdresearch/$repo.git" || true
              git add .
              git commit -m "Auto-update from Chelsea OpenAPI $(date)" || true
              git push origin main || git push origin master
              cd ../..
            fi
          done
          
      - name: Update Documentation
        run: |
          ./sync-vers-docs.sh
