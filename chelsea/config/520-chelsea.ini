# *************
# ** Chelsea **
# *************

# The port on which the Chelsea server API will live. Since chelsea_event_server_addr is a loopback alias, this must be different from chelsea_event_server_port.
chelsea_server_port=8111

# This IP address is reserved and will be assigned to a server serving the VM event endpoint to ensure the VM notify-ready script has a valid endpoint.
# Conventionally, this was 192.168.0.0:80, but this is now configurable at the chelsea level. notify-ready now uses boot args, passed by chelsea, to locate
# this server.
chelsea_event_server_addr=192.168.1.55
chelsea_event_server_port=8555

# Wireguard configuration
chelsea_wg_port=51820
chelsea_wg_interface_name=wgchelsea
chelsea_wg_public_key=59ul25nwOI5ypR5npkjcjt0ZXTWQsdq4lcf+sMkpeXg=
chelsea_wg_private_ip=fd00:fe11:deed::1

# Base data directory - where all Chelsea data will be stored
chelsea_data_dir=/var/lib/chelsea

# Database filename; this is relative to $data_dir/$db_subdir
chelsea_db_name=chelsea.db

# Data dir subdirs; all of these are relative to data_dir
chelsea_db_subdir=db
# Optional: Data dir subdirectory for timing layer log output.
# Set to "disabled" to turn off timing file writes. Set to "stdout" to write to stdout.
# chelsea_timing_log_subdir=profiling_logs
chelsea_timing_log_subdir=disabled
# chelsea_monitor logs
chelsea_monitoring_log_subdir=monitor_logs
# stdout/stderr from VM processes
chelsea_process_log_subdir=process_logs
# Directory to download kernels to
chelsea_kernel_subdir=kernels
# VM commit subdir
chelsea_commit_subdir=commits

# The maximum amount of snapshot/commit files, both locally-created and downloaded, to keep on disk in "cache" before rotating out old ones.
# NOTE: Please see https://github.com/hdresearch/chelsea/issues/713 for information about setting this value; it's not immediately intuitive.
chelsea_snapshot_dir_max_size_mib=81920

# Hard maxima - individual VMs may not exceed these counts
chelsea_vm_max_vcpu_count=4
chelsea_vm_max_memory_mib=8196
chelsea_vm_max_volume_mib=16392

# Whether or not chelsea will allow VM overprovisioning.
# WARNING: Enabling memory overprovisioning is potentially dangerous. If VM memory usage increases to beyond the host's capabilities (RAM
# and swap combined), then it is possible a hard lock will occur. It is the responsibility of the administrator to ensure
# that adequate swap space is configured, or that a monitoring process will begin to Sleep VMs when resource availability
# nears 0.
chelsea_allow_vcpu_overprovisioning=true
chelsea_allow_memory_overprovisioning=true

# The resource allocation designated to VMs; these values assume that every VM will be at 100% CPU and memory utilization.
# If overprovisioning is enabled, then a value of 0 wil be treated as infinity, and there will be no resource check on VM
# start; only Mulberry's host usage monitoring will be active. If overprovisioning is not enabled, then a value of 0 will
# be treated as 0; that is, no VMs with a non-zero vCPU count or memory size may be provisioned.
chelsea_vm_total_vcpu_count=192
# 402653184 bytes = 384 GiB
chelsea_vm_total_memory_mib=402653184

# Default values for VM creation
chelsea_vm_default_image_name=default
chelsea_vm_default_kernel_name=default.bin
chelsea_vm_default_vcpu_count=1
chelsea_vm_default_mem_size_mib=512
chelsea_vm_default_fs_size_mib=1024

# Network configuration
# The name of the host's main network interface - likely not necessary to change unless we change the way we provision c5.metal instances on AWS.
chelsea_network_interface=enp125s0
# WARNING: Ensure that this subnet does not contain the address chelsea_event_server_addr (default 192.168.0.0)
chelsea_vm_subnet=192.168.100.0/24
# When the NetworkManager receives a request to reserve a network, it will mark the network as reserved for at least this many seconds while the VM initializes.
chelsea_network_reserve_timeout_seconds=10

# SSH port range for VMs (inclusive start, exclusive end)
chelsea_vm_ssh_port_start=28000
chelsea_vm_ssh_port_end=28128

# Hypervisor selection: "firecracker" or "cloud-hypervisor"
chelsea_hypervisor_type=firecracker
chelsea_firecracker_kernel_name=default.bin
chelsea_cloud_hypervisor_kernel_name=ch.bin
chelsea_cloud_hypervisor_bin_path=/usr/local/bin/cloud-hypervisor

# Path to the firecracker executable on the host machine
chelsea_firecracker_bin_path=/usr/local/bin/firecracker
# The maximum time, in seconds, we will wait for a response from the Firecracker API
chelsea_firecracker_api_timeout_seconds=120
# How long chelsea will wait for a newly-created Firecracker process to create a socket
chelsea_firecracker_socket_timeout_seconds=10

# Cgroup isolation for VM processes
# All VM processes are placed under this cgroup to prevent them from starving host processes
chelsea_vm_cgroup_name=chelsea-vms
# CPU weight for the VM cgroup (1-10000, default 50). Host processes run at the default
# weight of 100, so VMs get ~1/3 of CPU when contending with host processes. This ensures
# chelsea and other host services remain responsive under heavy VM load.
chelsea_vm_cgroup_cpu_weight=50

# For any base Ceph image, there must exist a snap from which all clones will be created - chelsea and the Ceph cluster must agree on this
chelsea_ceph_base_image_snap_name=chelsea_base_image
# The maximum time, in seconds, Ceph client calls will wait before returning an error. (Ceph has a tendency to hang rather than time out.)
chelsea_ceph_client_timeout_seconds=10

# The RELATIVE PATH (do not prefix with /) path at which the VM's root drive will be mounted
chelsea_vm_root_drive_path=dev/vda1

# The less-privileged user under which jailer will run (will be created if it doesn't exist)
chelsea_vm_user_name=chelsea
# The maximum time, in seconds, chelsea will wait for a newly-created VM to send the "ready" event
chelsea_vm_boot_timeout_seconds=10

# AWS chelsea commit bucket config
chelsea_aws_commit_bucket_name=vers-commits-dev--use1-az4--x-s3
chelsea_aws_sleep_snapshot_bucket_name=vers-sleep-snapshots-dev--use1-az4--x-s3

# The maximum size, in bytes, of an acceptable payload on the image upload endpoints for orch and chelsea
chelsea_image_upload_max_body_bytes=1073741824

# **************
# ** Mulberry **
# **************

# How long Mulberry will wait in between iterations of each of its tasks' loops.
mulberry_ghost_vm_check_interval_seconds=20
mulberry_host_resource_check_interval_seconds=60
mulberry_orphan_wg_check_interval_seconds=60

# The number of times a VM may fail the ghost VM check before being restarted.
mulberry_ghost_vm_fail_count_restart_threshold=3

# The warning thresholds for host resource usage; when actual usage exceeds these, warning logs will be emitted. These values
# are to be percentages; memory thresholds include swap, such that a value of 125.0 could imply 100% of RAM is used, and 25% of
# the total RAM size is additionally consumed as swap. It could also imply that 80% of RAM and 45% of the RAM size is additionally
# consumed as swap
mulberry_cpu_usage_warning_threshold=80.0
mulberry_memory_and_swap_mib_usage_warning_threshold=80.0
mulberry_host_resource_check_interval_seconds=60
# Path to the chelsea-agent binary to embed in base images.
# If not set, auto-discovered from: next to current executable, then target/{release,debug}/
# chelsea_agent_binary_path=
