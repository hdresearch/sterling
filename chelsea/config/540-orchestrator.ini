# node_proto outgoing requests to chelsea
orchestrator_node_proto_request_timeout_seconds=120
# Timeout for incoming API requests
orchestrator_incoming_request_timeout_seconds=120
# Timeout while awaiting a response from a health check request to a chelsea node
orchestrator_health_check_timeout_seconds=5
orchestrator_action_timeout_seconds=120
# tokio_util task shutdown timeout
orchestrator_task_shutdown_timeout_seconds=120
# Timeout for file upload endpoints
orchestrator_file_upload_timeout_seconds=600
# How often (in seconds) the orchestrator reconciles its VM records against Chelsea nodes to clean up ghost VMs
orchestrator_vm_reconciliation_interval_seconds=60

