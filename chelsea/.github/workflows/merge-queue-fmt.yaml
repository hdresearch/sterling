name: Auto Format

# Runs cargo fmt after a PR merges into next, auto-committing any changes.
# This replaces the old per-PR format job — formatting now happens once at
# merge time instead of cluttering every PR push.

on:
  push:
    branches: [next]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-fmt:
    name: Format Merged Files
    runs-on: vers-ci2
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - name: Format changed Rust files
        run: |
          CHANGED_RS=$(git diff --name-only --diff-filter=d HEAD~1 HEAD -- '*.rs')
          if [ -n "$CHANGED_RS" ]; then
            echo "Formatting changed files:"
            echo "$CHANGED_RS"
            echo "$CHANGED_RS" | xargs -d '\n' /home/ubuntu/.cargo/bin/cargo fmt --
          else
            echo "No .rs files changed"
          fi

      - name: Commit and push formatting fixes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          if git diff --cached --quiet; then
            echo "No formatting changes needed"
          else
            git commit -m "style: cargo fmt (automated) [skip ci]"
            git push
          fi
