name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  orchestrator-tests:
    name: Orchestrator Tests
    runs-on: vers-ci2
    steps:
      # Self-hosted runners: clean: false preserves target/ between runs.
      # No cache step needed — artifacts persist on disk.
      - uses: actions/checkout@v6.0.2
        with:
          clean: false

      - name: Run unit tests
        run: |
          /home/ubuntu/.cargo/bin/cargo test -p orchestrator --lib -p node_balancer
          /home/ubuntu/.cargo/bin/cargo test -p billing --lib

      - name: Run integration tests
        run: /home/ubuntu/.cargo/bin/cargo nextest run -p orchestrator --test choose_node

  chelsea-db-tests:
    name: Chelsea DB Tests
    runs-on: vers-ci2
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          clean: false

      - name: Run tests
        run: /home/ubuntu/.cargo/bin/cargo test -p chelsea_db

  llm-proxy-tests:
    name: LLM Proxy Tests
    runs-on: vers-ci2
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          clean: false

      - name: Run unit tests
        run: /home/ubuntu/.cargo/bin/cargo test -p llm_proxy --lib

      - name: Run integration tests
        run: /home/ubuntu/.cargo/bin/cargo nextest run -p llm_proxy --test key_management --test budget_enforcement --test credits --test spend_tracking

  proxy-tests:
    name: Proxy Tests
    runs-on: vers-ci2
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          clean: false

      - name: Run unit tests
        run: /home/ubuntu/.cargo/bin/cargo test -p proxy --lib

      - name: Run integration tests
        run: /home/ubuntu/.cargo/bin/cargo test -p proxy --test ssh_idle_timeout -- --ignored

  chelsea-tests:
    name: Chelsea Tests
    runs-on: vers-ci2
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          clean: false

      - name: Run agent protocol tests
        run: /home/ubuntu/.cargo/bin/cargo test -p agent_protocol -p chelsea-agent

      - name: Run chelsea_lib unit tests
        run: /home/ubuntu/.cargo/bin/cargo test -p chelsea_lib --lib

      - name: Run S3 integration tests (MinIO testcontainer)
        run: /home/ubuntu/.cargo/bin/cargo test -p chelsea_lib --test s3_snapshot_store

  e2e-tests:
    name: E2E Tests (${{ matrix.hypervisor }})
    runs-on: vers-ci2
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        hypervisor: [firecracker, cloud-hypervisor]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          clean: false

      - name: Build
        run: |
          /home/ubuntu/.cargo/bin/cargo build --profile ci
          /home/ubuntu/.cargo/bin/cargo build --profile ci --target x86_64-unknown-linux-musl -p chelsea-agent
          # Scripts expect binaries in target/release/
          ln -sfn ci target/release

      - name: Clean stale state from previous runs
        run: |
          # Unmap stale RBD devices left by previous E2E runs.
          # Must happen before Chelsea starts, otherwise Chelsea caches
          # device paths that become invalid after pool recreation.
          echo "Unmapping stale RBD devices..."
          for dev in /dev/rbd*; do
            [ -b "$dev" ] && sudo rbd --id chelsea device unmap "$dev" 2>/dev/null && echo "  unmapped $dev" || true
          done
          # Remove stale WG/tap interfaces
          sudo ip link del wgchelsea 2>/dev/null || true
          sudo ip link del wgproxy 2>/dev/null || true
          sudo ip link del wgorchestrator 2>/dev/null || true
          sudo ip link del tap0 2>/dev/null || true
          echo "Clean."

      - name: Start single-node environment
        run: sudo ./scripts/single-node.sh start -d --hypervisor ${{ matrix.hypervisor }}

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Chelsea daemon..."
          for i in $(seq 1 30); do
            if curl -sf http://[fd00:fe11:deed::100]:8111/api/system/health >/dev/null 2>&1; then
              echo "Chelsea ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Chelsea not ready after 30s"
              echo "--- tmux sessions ---"
              sudo tmux ls 2>&1 || true
              echo "--- chelsea log ---"
              tail -50 /var/log/vers-sne/chelsea.log 2>/dev/null || echo "no log"
              echo "--- orchestrator log ---"
              tail -50 /var/log/vers-sne/orchestrator.log 2>/dev/null || echo "no log"
              echo "--- listening ports ---"
              sudo ss -tlnp | grep -E '8111|8090|443' || true
              exit 1
            fi
            sleep 1
          done

      - name: Clone and build Eagle
        run: make clone-and-build-eagle

      - name: Run E2E quick tests
        run: make test-only-quick

      - name: Stop single-node environment
        if: always()
        run: |
          echo "Stopping single-node environment"
          sudo ./scripts/single-node.sh shutdown

      - name: Fix root-owned files
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}
