name: Sync OpenAPI Spec to Docs

on:
  push:
    branches:
      - next
  workflow_dispatch:

jobs:
  sync-openapi:
    runs-on: vers-ci2
    steps:
      - name: Checkout chelsea
        uses: actions/checkout@v6.0.2
        with:
          path: chelsea

      - name: Checkout vers-docs
        uses: actions/checkout@v6.0.2
        with:
          repository: hdresearch/vers-docs
          path: vers-docs
          token: ${{ secrets.DOCS_REPO_PAT }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            chelsea/target/
          key: ${{ runner.os }}-cargo-openapi-${{ hashFiles('chelsea/**/Cargo.lock') }}

      - name: Generate OpenAPI spec
        working-directory: chelsea
        run: /home/ubuntu/.cargo/bin/cargo run -p orchestrator --bin openapi

      - name: Check for changes
        id: diff
        run: |
          if diff -q chelsea/openapi/orchestrator.openapi.json vers-docs/api-reference/openapi.json > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to OpenAPI spec"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "OpenAPI spec has changed"
          fi

      - name: Create PR in vers-docs
        if: steps.diff.outputs.changed == 'true'
        working-directory: vers-docs
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch
          BRANCH_NAME="auto/update-openapi-spec-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"

          # Copy updated spec
          cp ../chelsea/openapi/orchestrator.openapi.json api-reference/openapi.json

          # Commit and push
          git add api-reference/openapi.json
          git commit -m "Update OpenAPI spec from chelsea

          Auto-generated from chelsea commit ${{ github.sha }}"

          git push origin "$BRANCH_NAME"

          # Create PR
          gh pr create \
            --title "Update OpenAPI spec" \
            --body "This PR updates the OpenAPI spec from the chelsea repository.

          **Source commit:** ${{ github.repository }}@${{ github.sha }}

          ---
          *This PR was automatically generated.*"
