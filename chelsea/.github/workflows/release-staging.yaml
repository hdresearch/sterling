name: Release Staging

on:
  push:
    branches: ["next"]

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: vers-ci2
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          clean: false

      - name: Build
        run: |
          /home/ubuntu/.cargo/bin/cargo build --profile ci
          /home/ubuntu/.cargo/bin/cargo build --profile ci --target x86_64-unknown-linux-musl -p chelsea-agent
          # Scripts expect binaries in target/release/
          ln -sfn ci target/release

      - name: Clean stale state from previous runs
        run: |
          # Unmap stale RBD devices left by previous E2E runs.
          # Must happen before Chelsea starts, otherwise Chelsea caches
          # device paths that become invalid after pool recreation.
          echo "Unmapping stale RBD devices..."
          for dev in /dev/rbd*; do
            [ -b "$dev" ] && sudo rbd --id chelsea device unmap "$dev" 2>/dev/null && echo "  unmapped $dev" || true
          done
          # Remove stale WG/tap interfaces
          sudo ip link del wgchelsea 2>/dev/null || true
          sudo ip link del wgproxy 2>/dev/null || true
          sudo ip link del wgorchestrator 2>/dev/null || true
          sudo ip link del tap0 2>/dev/null || true
          echo "Clean."

      - name: Start single-node environment
        run: sudo ./scripts/single-node.sh start -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Chelsea daemon..."
          for i in $(seq 1 30); do
            if curl -sf http://[fd00:fe11:deed::100]:8111/api/system/health >/dev/null 2>&1; then
              echo "Chelsea ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Chelsea not ready after 30s"
              echo "--- tmux sessions ---"
              sudo tmux ls 2>&1 || true
              echo "--- chelsea log ---"
              tail -50 /var/log/vers-sne/chelsea.log 2>/dev/null || echo "no log"
              echo "--- orchestrator log ---"
              tail -50 /var/log/vers-sne/orchestrator.log 2>/dev/null || echo "no log"
              echo "--- listening ports ---"
              sudo ss -tlnp | grep -E '8111|8090|443' || true
              exit 1
            fi
            sleep 1
          done

      - name: Build Chelsea Agent (static musl binary)
        run: |
          /home/ubuntu/.cargo/bin/cargo build --profile ci --target x86_64-unknown-linux-musl -p chelsea-agent
          cp target/x86_64-unknown-linux-musl/ci/chelsea-agent .

      - name: Fix externals ownership
        run: |
          if [ -d ./externals ]; then
            sudo chown -R $(whoami) ./externals/
          fi

      - name: Clone and build Eagle
        run: make clone-and-build-eagle

      - name: Run E2E quick tests
        run: make test-only-quick

      - name: Stop single-node environment
        if: always()
        run: |
          echo "Stopping single-node environment"
          sudo ./scripts/single-node.sh shutdown

      - name: Fix root-owned files
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}

  migrate:
    runs-on: vers-ci2
    needs: [e2e-tests]
    if: needs.e2e-tests.result == 'success'
    env:
      PGPASSWORD_STAGING: ${{ secrets.PGPASSWORD_STAGING }}
    steps:
      - uses: actions/checkout@v6.0.2
      - run: ./pg/scripts/migrate-staging.sh

  release-staging:
    name: Release Staging
    needs: [migrate]
    if: needs.migrate.result == 'success'
    runs-on: release-manager
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build
        run: ./scripts/build-release.sh staging

      - name: Release
        run: ./scripts/make-release.sh staging

      - name: Smoke Test
        run: sleep 45 && ./scripts/smoke_test.sh staging
