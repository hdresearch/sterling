name: Generate and Upload OpenAPI Spec

on:
  push:
    branches:
      - next
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: vers-ci2
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-v1

      - name: Generate Orchestrator OpenAPI spec
        run: /home/ubuntu/.cargo/bin/cargo run -p orchestrator --bin openapi

      - name: Upload to Stainless
        uses: stainless-api/upload-openapi-spec-action@main
        with:
          stainless_api_key: ${{ secrets.STAINLESS_API_KEY }}
          input_path: "openapi/orchestrator.openapi.json"
          config_path: "openapi/openapi.stainless.yaml"
          project_name: "firecracker-manager"
