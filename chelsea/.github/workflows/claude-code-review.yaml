name: Claude Code Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  claude-review:
    # Only review if CI passed
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    runs-on: vers-ci2
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Get PR number
        id: pr
        run: |
          # workflow_run doesn't directly expose PR number — extract from the head branch
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${{ github.event.workflow_run.head_branch }}&state=open" --jq '.[0].number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open PR found for branch ${{ github.event.workflow_run.head_branch }}"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Hide Previous Claude Reviews
        run: |
          # Find and minimize all previous Claude comments
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"

          # Claude bot identifiers (multiple methods for maximum robustness)
          CLAUDE_USER_ID="209825114"

          # Get all comments on the PR and find their node IDs
          # Use multiple filters: user ID, username patterns, and signature fallback
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --jq '
            .[] | select(
              .user.id == '$CLAUDE_USER_ID' or
              (.user.login | test("claude"; "i")) or
              (.body | contains("Generated by Claude Code Review")) or
              (.body | test("Pull Request Review.*Claude"; "m"))
            ) | .node_id
          ' | while read node_id; do
            if [ ! -z "$node_id" ]; then
              echo "Minimizing previous Claude review comment: $node_id"
              gh api graphql -f query='
                mutation {
                  minimizeComment(input: {
                    subjectId: "'$node_id'"
                    classifier: OUTDATED
                  }) {
                    minimizedComment {
                      isMinimized
                    }
                  }
                }
              ' || echo "Failed to minimize comment $node_id"
            fi
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

            IMPORTANT: Include the text "Generated by Claude Code Review" somewhere in your comment as a backup identification method.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
