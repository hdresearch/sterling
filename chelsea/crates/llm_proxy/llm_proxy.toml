# LLM Proxy Configuration

[server]
host = "0.0.0.0"
port = 8090
admin_api_key = "admin-secret-change-me"

[database]
url = "postgres://postgres:opensesame@localhost:5432/vers"
# log_url defaults to url — both share the same DB in dev

# ─── Providers ────────────────────────────────────────────────────────────────

[providers.openai]
type = "openai"
api_key_env = "OPENAI_API_KEY"

[providers.anthropic]
type = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"

# Example: local vLLM or Ollama
# [providers.local]
# type = "openai_compatible"
# api_base = "http://localhost:8000/v1"

# ─── Models ───────────────────────────────────────────────────────────────────
# Public model name → routing (provider fallback chain) + optional provider model name

[models.gpt-4o]
routing = ["openai"]

[models.gpt-4o-mini]
routing = ["openai"]

# Friendly aliases
[models.claude-sonnet]
routing = ["anthropic"]
model_name = "claude-sonnet-4-20250514"

[models.claude-opus]
routing = ["anthropic"]
model_name = "claude-opus-4-20250514"

[models.claude-haiku]
routing = ["anthropic"]
model_name = "claude-haiku-4-5-20251001"

# Pass-through model IDs (what SDKs like pi actually send)
[models.claude-sonnet-4-20250514]
routing = ["anthropic"]

[models.claude-sonnet-4-5-20250929]
routing = ["anthropic"]

[models.claude-sonnet-4-6]
routing = ["anthropic"]

[models.claude-opus-4-20250514]
routing = ["anthropic"]

[models.claude-opus-4-5-20251101]
routing = ["anthropic"]

[models.claude-opus-4-6]
routing = ["anthropic"]

[models.claude-opus-4-6-thinking]
routing = ["anthropic"]

[models.claude-haiku-4-5-20251001]
routing = ["anthropic"]
