# LLM Proxy — Production Configuration
#
# Secrets are injected via environment variables by ECS (see terraform/ecs.tf):
#   LLM_PROXY_DATABASE_URL, LLM_PROXY_LOG_DATABASE_URL, LLM_PROXY_ADMIN_API_KEY,
#   OPENAI_API_KEY, ANTHROPIC_API_KEY

[server]
host = "0.0.0.0"
port = 8090
# admin_api_key is set via LLM_PROXY_ADMIN_API_KEY env var

[database]
# Overridden by LLM_PROXY_DATABASE_URL and LLM_PROXY_LOG_DATABASE_URL env vars
url = "postgres://localhost/vers"

# ─── Providers ────────────────────────────────────────────────────────────────

[providers.openai]
type = "openai"
api_key_env = "OPENAI_API_KEY"

[providers.anthropic]
type = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"

# ─── Models ───────────────────────────────────────────────────────────────────

[models.gpt-4o]
routing = ["openai"]

[models.gpt-4o-mini]
routing = ["openai"]

[models.claude-sonnet]
routing = ["anthropic"]
model_name = "claude-sonnet-4-20250514"

[models.claude-opus]
routing = ["anthropic"]
model_name = "claude-opus-4-20250514"

[models.claude-haiku]
routing = ["anthropic"]
model_name = "claude-haiku-4-5-20251001"

# Pass-through model IDs
[models.claude-sonnet-4-20250514]
routing = ["anthropic"]

[models.claude-sonnet-4-5-20250929]
routing = ["anthropic"]

[models.claude-sonnet-4-6]
routing = ["anthropic"]

[models.claude-opus-4-20250514]
routing = ["anthropic"]

[models.claude-opus-4-5-20251101]
routing = ["anthropic"]

[models.claude-opus-4-6]
routing = ["anthropic"]

[models.claude-opus-4-6-thinking]
routing = ["anthropic"]

[models.claude-haiku-4-5-20251001]
routing = ["anthropic"]
