[project]
name = "chelsea"
version = "1.0.0"
description = "Chelsea API SDKs"
author = "HD Research"
license = "MIT"

[source]
type = "github"
repo = "hdresearch/chelsea"
openapi_path = "openapi/openapi.yaml"  # Correct path based on repo structure
branch = "main"

[targets.typescript]
language = "typescript"
output_dir = "generated/chelsea-typescript-sdk"
package_name = "@hdresearch/chelsea"
github_repo = "hdresearch/chelsea-typescript-sdk"
npm_publish = true
create_repo = true

[targets.rust]
language = "rust"
output_dir = "generated/chelsea-rust-sdk"
package_name = "chelsea"
github_repo = "hdresearch/chelsea-rust-sdk"
crates_publish = true
create_repo = true

[targets.python]
language = "python"
output_dir = "generated/chelsea-python-sdk"
package_name = "chelsea"
github_repo = "hdresearch/chelsea-python-sdk"
pypi_publish = true
create_repo = true

[targets.go]
language = "go"
output_dir = "generated/chelsea-go-sdk"
package_name = "github.com/hdresearch/chelsea-go-sdk"
github_repo = "hdresearch/chelsea-go-sdk"
create_repo = true

[documentation]
generate = true
output_dir = "generated/docs"
docs_repo = "hdresearch/vers-docs"
docs_path = "docs/api/chelsea"  # Adjusted for vers-docs structure
format = "mintlify"

[llm]
provider = "anthropic"
model = "claude-3-5-sonnet-20241022"
enhance_code = true
enhance_docs = true
fix_compilation = true
auto_tag = true
semantic_versioning = true
